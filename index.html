<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Examen - Sistemas Operativos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 20px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        #quiz-header {
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        #question-text {
            font-size: 18px;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            background-color: #ecf0f1;
            border: 2px solid #bdc3c7;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: left;
        }
        .option-btn:hover {
            background-color: #d5dbdb;
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        .correct {
            background-color: #2ecc71 !important;
            color: white;
            border-color: #27ae60 !important;
        }
        .incorrect {
            background-color: #e74c3c !important;
            color: white;
            border-color: #c0392b !important;
        }
        #feedback-area {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            min-height: 30px;
        }
        #next-btn, #restart-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            display: none;
        }
        #next-btn:hover, #restart-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Simulador de Examen de Sistemas Operativos</h1>

        <button id="restart-btn" style="display: inline-block;" onclick="reiniciarExamen()">Volver a intentar</button>
    </div>
</div>

    let bancoPreguntas = [];
    let preguntaActualIndex = 0;
    let puntaje = 0;

    // Función para barajar un array (Fisher-Yates)
    function barajarArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function iniciarExamen() {
        // Clonar y barajar el banco de preguntas
        bancoPreguntas = JSON.parse(JSON.stringify(bancoPreguntasOriginal));
        barajarArray(bancoPreguntas);
        preguntaActualIndex = 0;
        puntaje = 0;
        
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';
        
        mostrarPregunta();
    }

    function mostrarPregunta() {
        const item = bancoPreguntas[preguntaActualIndex];
        
        document.getElementById('quiz-header').innerText = `--- Pregunta ${preguntaActualIndex + 1} de ${bancoPreguntas.length} ---`;
        document.getElementById('question-text').innerText = item.pregunta;
        document.getElementById('feedback-area').innerText = '';
        document.getElementById('next-btn').style.display = 'none';

        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = ''; // Limpiar opciones anteriores

        // Clonar y barajar opciones
        let opcionesMezcladas = [...item.opciones];
        barajarArray(opcionesMezcladas);

        opcionesMezcladas.forEach(opcion => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opcion;
            btn.onclick = () => evaluarRespuesta(opcion, btn, item.respuesta);
            optionsContainer.appendChild(btn);
        });
    }

    function evaluarRespuesta(seleccionada, botonSeleccionado, correcta) {
        const botones = document.querySelectorAll('.option-btn');
        const feedbackArea = document.getElementById('feedback-area');

        // Deshabilitar botones para no permitir más clics
        botones.forEach(btn => {
            btn.disabled = true;
            if (btn.innerText === correcta) {
                btn.classList.add('correct'); // Resaltar la correcta
            }
        });

        if (seleccionada === correcta) {
            feedbackArea.innerText = "✅ ¡CORRECTO!";
            feedbackArea.style.color = "#27ae60";
            puntaje++;
        } else {
            botonSeleccionado.classList.add('incorrect'); // Marcar la incorrecta
            feedbackArea.innerText = "❌ INCORRECTO. La respuesta era: " + correcta;
            feedbackArea.style.color = "#c0392b";
        }

        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function siguientePregunta() {
        preguntaActualIndex++;
        if (preguntaActualIndex < bancoPreguntas.length) {
            mostrarPregunta();
        } else {
            mostrarResultados();
        }
    }

    function mostrarResultados() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        const total = bancoPreguntas.length;
        const porcentaje = ((puntaje / total) * 100).toFixed(2);
        
        document.getElementById('final-score').innerText = `Tu puntuación final es: ${puntaje} aciertos de ${total} posibles.`;
        document.getElementById('final-percentage').innerText = `Porcentaje de acierto: ${porcentaje}%`;
    }

    function reiniciarExamen() {
        iniciarExamen();
    }

    // Arrancar el examen al cargar la página
    window.onload = iniciarExamen;
</script>

</body>
</html>
