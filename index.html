<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Examen - Sistemas Operativos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 20px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        
        /* Estilos para la pantalla de inicio */
        #start-area-tema h2, #start-area-cantidad h2 {
            color: #34495e;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .cantidad-btn {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: background-color 0.3s;
        }
        .cantidad-btn:hover {
            background-color: #2c3e50;
        }
        .tema-btn {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: background-color 0.3s;
            display: block;
            width: 100%;
            box-sizing: border-box;
        }
        .tema-btn:hover {
            background-color: #1f618d;
        }

        #quiz-header {
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        #question-text {
            font-size: 18px;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            background-color: #ecf0f1;
            border: 2px solid #bdc3c7;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: left;
        }
        .option-btn:hover {
            background-color: #d5dbdb;
        }
        
        /* Modificamos disabled visual pero no funcional para permitir cambios */
        .correct {
            background-color: #2ecc71 !important;
            color: white;
            border-color: #27ae60 !important;
        }
        .incorrect {
            background-color: #e74c3c !important;
            color: white;
            border-color: #c0392b !important;
        }
        #feedback-area {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            min-height: 30px;
        }
        
        /* Contenedor de los botones de navegación */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        
        #next-btn, #restart-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        #next-btn:hover, #restart-btn:hover {
            background-color: #2980b9;
        }
        #prev-btn {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        #prev-btn:hover {
            background-color: #636e72;
        }
        
        /* Estilos para el resumen de resultados */
        .resumen-resultados {
            text-align: left;
            background: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 16px;
        }
        .nota-final {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 15px;
            border-top: 2px solid #bdc3c7;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Simulador de Examen de Sistemas Operativos</h1>
    
    <div id="start-area-tema">
        <h2>1. Selecciona el Tema</h2>
        <button class="tema-btn" onclick="seleccionarTema('Todos')">Todos los temas mezclados</button>
        <button class="tema-btn" onclick="seleccionarTema('Tema 1')">Tema 1: Introducción a Sistemas Operativos</button>
        <button class="tema-btn" onclick="seleccionarTema('Tema 2')">Tema 2: Gestión de Procesos</button>
        <button class="tema-btn" onclick="seleccionarTema('Tema 3')">Tema 3: Coordinación y Sincronización</button>
        <button class="tema-btn" onclick="seleccionarTema('Tema 4')">Tema 4: Gestión de Memoria</button>
        <button class="tema-btn" onclick="seleccionarTema('Tema 5')">Tema 5: Gestión de E/S y Ficheros</button>
        <button class="tema-btn" onclick="seleccionarTema('Segundo Parcial')">Segundo parcial (Tema 4 + Tema 5)</button>
    </div>

    <div id="start-area-cantidad" style="display: none;">
        <h2>2. ¿Cuántas preguntas quieres responder?</h2>
        <button class="cantidad-btn" onclick="iniciarExamen(15)">15 Preguntas</button>
        <button class="cantidad-btn" onclick="iniciarExamen(30)">30 Preguntas</button>
        <button class="cantidad-btn" onclick="iniciarExamen(50)">50 Preguntas</button>
        <button class="cantidad-btn" onclick="iniciarExamen(75)">75 Preguntas</button>
        <button class="cantidad-btn" onclick="iniciarExamen(9999)">Todas</button>
        <br><br>
        <button class="cantidad-btn" style="background-color: #7f8c8d;" onclick="volverAlInicio()">Cambiar Tema</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div id="quiz-header"></div>
        <div id="question-text"></div>
        <div class="options-container" id="options"></div>
        <div id="feedback-area"></div>
        
        <div class="nav-buttons">
            <button id="prev-btn" style="display: none;" onclick="preguntaAnterior()">⬅ Anterior</button>
            <button id="next-btn" style="display: none;" onclick="siguientePregunta()">Siguiente ➡</button>
        </div>
    </div>

    <div id="result-area" style="display: none;">
        <h2>FIN DEL EXAMEN</h2>
        <div id="resumen-container" class="resumen-resultados"></div>
        <button id="restart-btn" onclick="volverAlInicio()">Volver al menú principal</button>
    </div>
</div>

<script>
    // Banco de preguntas EXACTO al tuyo original
    const bancoPreguntasOriginal = [
        {
            "tema": "Tema 1",
            "pregunta": "¿Cuál de las siguientes componentes de un sistema informático tiene un MAYOR nivel de abstracción?",
            "opciones": ["El sistema operativo.", "El hardware.", "Los usuarios.", "Las aplicaciones de usuario."],
            "respuesta": "Las aplicaciones de usuario."
        },
        {
            "tema": "Tema 1",
            "pregunta": "¿Qué es una llamada al sistema?",
            "opciones": ["Un elemento hardware que permite acceder a los servicios del sistema operativo.", "Una aplicación que ejecutan los usuarios para acceder a los servicios del sistema operativo.", "Una interrupción síncrona que permite a los procesos acceder a los servicios del sistema operativo.", "Una interrupción síncrona que se produce de forma involuntaria a los procesos."],
            "respuesta": "Una interrupción síncrona que permite a los procesos acceder a los servicios del sistema operativo."
        },
        {
            "tema": "Tema 1",
            "pregunta": "En los sistemas multiprogramados...",
            "opciones": ["...se obtiene un mejor rendimiento de la CPU si el número de procesos en memoria principal es elevado.", "...el hardware debe tener un reloj.", "...un proceso no puede comenzar su ejecución hasta que el anterior se haya ejecutado completamente (haya finalizado).", "...la CPU nunca está ociosa."],
            "respuesta": "...se obtiene un mejor rendimiento de la CPU si el número de procesos en memoria principal es elevado."
        },
        {
            "tema": "Tema 2",
            "pregunta": "¿Cuál de las siguientes situaciones aumenta, a priori, el tiempo de respuesta de los procesos?",
            "opciones": ["Que haya muchos usuarios en el sistema informático trabajando simultáneamente.", "Que haya pocas CPUs.", "Que un proceso ejecute siempre su ráfaga de CPU seguida (sin que otro proceso tome la CPU).", "Que haya muchos procesos realizando entrada/salida."],
            "respuesta": "Que un proceso ejecute siempre su ráfaga de CPU seguida (sin que otro proceso tome la CPU)."
        },
        {
            "tema": "Tema 1",
            "pregunta": "En un sistema operativo con tiempo compartido, ¿bajo qué circunstancia un proceso abandona el uso de la CPU?",
            "opciones": ["Sólo cuando comienza una entrada/salida.", "Únicamente si se produce cualquier interrupción software o un fin de cuanto.", "Únicamente si se produce una interrupción hardware o un fin de cuanto.", "Únicamente si se produce una interrupción hardware o una excepción o una llamada al sistema."],
            "respuesta": "Únicamente si se produce una interrupción hardware o una excepción o una llamada al sistema."
        },
        {
            "tema": "Tema 2",
            "pregunta": "Señala en qué tipo de sistema operativo todos los procesos tienen un tiempo de retorno normalizado igual a uno:",
            "opciones": ["En los sistemas operativos monoprogramados.", "En los sistemas operativos multiprogramados.", "En los sistemas operativos de tiempo compartido.", "En cualquier sistema operativo."],
            "respuesta": "En los sistemas operativos monoprogramados."
        },
        {
            "tema": "Tema 1",
            "pregunta": "Se tiene un sistema informático UEFI indica cuál de las siguientes situaciones NO puede darse:",
            "opciones": ["Qué un disco tenga sistema de particiones BIOS/MSDOS.", "Que se arranque un sistema operativo antiguo que no soporta UEFI.", "Que un sistema operativo arranque en modo seguro.", "Todas las anteriores son falsas (todas las situaciones anteriores pueden ocurrir en un sistema UEFI)."],
            "respuesta": "Todas las anteriores son falsas (todas las situaciones anteriores pueden ocurrir en un sistema UEFI)."
        },
        {
            "tema": "Tema 1",
            "pregunta": "Elige de entre los siguientes el que se ejecuta después de todos los demás:",
            "opciones": ["El sistema operativo.", "El gestor de arranque.", "El firmware.", "El código del MBR."],
            "respuesta": "El sistema operativo."
        },
        {
            "tema": "Tema 1",
            "pregunta": "Durante el proceso de arranque de un ordenador, ¿qué se puede elegir en la BIOS?:",
            "opciones": ["De qué dispositivo arrancar.", "De qué partición primaria arrancar (hacerla activa)", "Habilitar/Deshabilitar el MBR de los discos.", "Todas las anteriores son falsas."],
            "respuesta": "De qué dispositivo arrancar."
        },
        {
            "tema": "Tema 2",
            "pregunta": "Cuando se crea un proceso a partir de otro mediante clonación...",
            "opciones": ["...se accede a memoria secundaria.", "...ambos procesos ejecutan el mismo programa.", "...ambos procesos comparten el código y los datos en memoria principal, pero no la pila ni el PCB.", "...los dos procesos comparten todo en memoria principal excepto parte del PCB."],
            "respuesta": "...ambos procesos ejecutan el mismo programa."
        },
        {
            "tema": "Tema 2",
            "pregunta": "¿Cuál de las siguientes estadísticas indica el tiempo total que ha estado un proceso en el sistema?",
            "opciones": ["El tiempo de retorno.", "El tiempo de retorno normalizado.", "El tiempo de espera.", "El tiempo de servicio."],
            "respuesta": "El tiempo de retorno."
        },
        {
            "tema": "Tema 2",
            "pregunta": "¿Cuál de las siguientes transiciones de estados de un proceso solo se puede dar si el planificador a corto plazo utiliza una política con requisamiento?",
            "opciones": ["De EJECUTANDO a BLOQUEADO.", "De BLOQUEADO a EJECUTANDO.", "De EJECUTANDO a FINALIZADO.", "De EJECUTANDO a LISTO."],
            "respuesta": "De EJECUTANDO a LISTO."
        },
        {
            "tema": "Tema 2",
            "pregunta": "¿Por qué es necesario realizar las operaciones de salvar y restaurar contexto en un S.O.?",
            "opciones": ["Para que funcione correctamente el intercalado de instrucciones.", "Para que pueda saberse el estado en que están los procesos.", "Para poder calcular las estadísticas asociadas a cada proceso (tr, te, ts, etc).", "Para que el S.O. pueda tomar el control."],
            "respuesta": "Para que funcione correctamente el intercalado de instrucciones."
        },
        {
            "tema": "Tema 2",
            "pregunta": "¿Cuáles de los siguientes planificadores del S.O. puede disminuir el grado de multiprogramación?",
            "opciones": ["Solo el planificador a medio plazo y el planificador a largo plazo.", "Solo el planificador a corto plazo y el planificador a largo plazo.", "Solo el planificador a medio plazo.", "Los tres planificadores (corto, medio y largo) pueden disminuir el grado de multiprogramación."],
            "respuesta": "Solo el planificador a medio plazo y el planificador a largo plazo."
        },
        {
            "tema": "Tema 2",
            "pregunta": "En un sistema operativo multihilo, ¿qué información se guarda en el TCB?",
            "opciones": ["El estado del proceso.", "El estado de los registros del procesador.", "El usuario propietario del hilo.", "Las variables locales de cada hilo."],
            "respuesta": "El estado de los registros del procesador."
        },
        {
            "tema": "Tema 2",
            "pregunta": "¿Cuál de las siguientes políticas de planificación a corto plazo es sin requisamiento?",
            "opciones": ["Colas multinivel", "FIFO.", "RR + Prioridades", "RR+FIFO"],
            "respuesta": "FIFO."
        },
        {
            "tema": "Tema 3",
            "pregunta": "¿Cuál de las siguientes técnicas garantiza, en última instancia (el resto de técnicas funcionan gracias a ésta), que se puede realizar exclusión mutua a los recursos?",
            "opciones": ["Las instrucciones máquina Test&Set o Swap.", "El hardware del sistema informático.", "Los semáforos.", "Las interrupciones hardware."],
            "respuesta": "El hardware del sistema informático."
        },
        {
            "tema": "Tema 3",
            "pregunta": "¿Cómo se puede garantizar el acceso exclusivo a una sección crítica mediante semáforos?",
            "opciones": ["Usando un semáforo binario S inicializado a 1 y rodeando dicha sección crítica de las operaciones P(S) y V(S).", "Usando un semáforo binario S inicializado a 0 y rodeando dicha sección crítica de las operaciones P(S) y V(S).", "Usando dos semáforos binarios S1 y S2 inicializados a 1 y rodeando dicha sección crítica de las operaciones P(S1) y V(S2).", "Usando dos semáforos binarios S1 y S2 inicializados a 0 y rodeando dicha sección crítica de las operaciones P(S1) y V(S2)."],
            "respuesta": "Usando un semáforo binario S inicializado a 1 y rodeando dicha sección crítica de las operaciones P(S) y V(S)."
        },
        {
            "tema": "Tema 3",
            "pregunta": "Se tienen dos procesos P1 y P2 accediendo a dos recursos globales compartidos R1 y R2. Señala la respuesta correcta cuando se quiere garantizar la exclusión mutua de ambos recursos:",
            "opciones": ["No se puede utilizar un único semáforo.", "Si P1 accede a una sección crítica de R1 entonces P2 no puede estar en ninguna sección crítica.", "P1 y P2 pueden estar dentro de una sección crítica simultáneamente.", "Deben utilizarse tantos semáforos como secciones críticas haya en el código."],
            "respuesta": "P1 y P2 pueden estar dentro de una sección crítica simultáneamente."
        },
        {
            "tema": "Tema 3",
            "pregunta": "En programación concurrente, ¿qué es una sección crítica?",
            "opciones": ["Una sección del área de datos donde dos o más procesos y/o hilos acceden de forma compartida.", "Una sección de código en el que se accede a cualquier variable.", "Una sección de código en el que se accede a una variable global compartida por dos o más procesos y/o hilos.", "Una rutina de interrupción manejada por el S.O."],
            "respuesta": "Una sección de código en el que se accede a una variable global compartida por dos o más procesos y/o hilos."
        },
        {
            "tema": "Tema 1",
            "pregunta": "Indica la respuesta FALSA en cuanto a la relación de un proceso y el sistema operativo:",
            "opciones": ["El sistema operativo no interviene si el proceso no lo requiere.", "El sistema operativo ejecuta la instrucción IRET antes de asignar la CPU a un proceso.", "El sistema operativo se compone de procesos (y otros datos).", "Un proceso de usuario sólo puede acceder al hardware a través del sistema operativo."],
            "respuesta": "El sistema operativo no interviene si el proceso no lo requiere."
        },
        {
            "tema": "Tema 1",
            "pregunta": "Las interrupciones:",
            "opciones": ["Tienen rutinas de ejecución (manejadores de interrupción) propias para cada proceso.", "Tienen rutinas de ejecución (manejadores de interrupción) que no pertenecen al sistema operativo.", "Pueden ser hardware, software y reloj.", "Siempre hacen que el sistema operativo tome el control de la CPU."],
            "respuesta": "Siempre hacen que el sistema operativo tome el control de la CPU."
        },
        {
            "tema": "Tema 2",
            "pregunta": "Un proceso:",
            "opciones": ["Puede ser desalojado de la CPU por otro proceso más prioritario aunque no haya mediado una interrupción.", "Sólo sale de la CPU tras ejecutar la instrucción TRAP.", "Siempre empieza su ejecución usando la CPU y acaba por una interrupción.", "Siempre empieza y acaba su ejecución usando la CPU."],
            "respuesta": "Puede ser desalojado de la CPU por otro proceso más prioritario aunque no haya mediado una interrupción."
        },
        {
            "tema": "Tema 2",
            "pregunta": "¿De qué partes consta la imagen de un proceso?",
            "opciones": ["El código y los datos de su fichero ejecutable.", "El PCB, la pila y el código y los datos de su fichero ejecutable.", "Todas las demás son falsas.", "El PCB y el código del programa."],
            "respuesta": "El PCB, la pila y el código y los datos de su fichero ejecutable."
        },
        {
            "tema": "Tema 3",
            "pregunta": "El principal beneficio de la cooperación por comunicación entre procesos frente a la cooperación por compartición es:",
            "opciones": ["La comunicación la controla el sistema operativo y no el programador.", "Que no existe el problema de exclusión mutua.", "Las señales son mucho más flexibles que los semáforos.", "Nunca puede haber un deadlock."],

        {

            "respuesta": "El sistema no podrá arrancar un SO."
        },
        {
            "tema": "Tema 2",
            "pregunta": "¿Qué es el grado de multiprogramación?",
            "opciones": ["El número de procesos en memoria principal más el número de procesos en memoria secundaria.", "El número de procesos en estado 'LISTO'.", "El número de procesos en memoria principal.", "El número de procesos en el sistema informático."],
            "respuesta": "El número de procesos en memoria principal más el número de procesos en memoria secundaria."

    let bancoPreguntas = [];
    let preguntaActualIndex = 0;
    let temaSeleccionado = "Todos";

    function seleccionarTema(tema) {
        temaSeleccionado = tema;
        document.getElementById('start-area-tema').style.display = 'none';
        document.getElementById('start-area-cantidad').style.display = 'block';
    }

    function barajarArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function iniciarExamen(cantidad) {
        let preguntasFiltradas = bancoPreguntasOriginal;
        if (temaSeleccionado === "Segundo Parcial") {
            preguntasFiltradas = bancoPreguntasOriginal.filter(p => p.tema === "Tema 4" || p.tema === "Tema 5");
        } else if (temaSeleccionado !== "Todos") {
            preguntasFiltradas = bancoPreguntasOriginal.filter(p => p.tema === temaSeleccionado);
        }
        
        // Evitar iniciar un examen vacío por un posible error en el filtrado de preguntas
        if (preguntasFiltradas.length === 0) {
            alert("No hay preguntas disponibles para el tema seleccionado. Vuelve a intentarlo.");
            volverAlInicio();
            return;
        }

        let preguntasMezcladas = JSON.parse(JSON.stringify(preguntasFiltradas));
        barajarArray(preguntasMezcladas);
        
        const cantidadReal = Math.min(cantidad, preguntasMezcladas.length);
        bancoPreguntas = preguntasMezcladas.slice(0, cantidadReal);
        
        // Preparar cada pregunta: guardar orden de opciones y limpiar respuestas previas
        bancoPreguntas.forEach(q => {
            q.opcionesMezcladas = [...q.opciones];
            barajarArray(q.opcionesMezcladas);
            q.respuestaUsuario = null; // Para guardar lo que marque el usuario
        });
        
        preguntaActualIndex = 0;
        
        document.getElementById('start-area-tema').style.display = 'none';
        document.getElementById('start-area-cantidad').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';
        
        mostrarPregunta();
    }

    function mostrarPregunta() {
        const item = bancoPreguntas[preguntaActualIndex];
        
        let temaEtiqueta = (temaSeleccionado === "Todos" || temaSeleccionado === "Segundo Parcial") ? ` (${item.tema})` : "";
        document.getElementById('quiz-header').innerText = `--- Pregunta ${preguntaActualIndex + 1} de ${bancoPreguntas.length}${temaEtiqueta} ---`;
        document.getElementById('question-text').innerText = item.pregunta;
        
        // Mostrar u ocultar el botón "Anterior" dependiendo de la pregunta actual
        document.getElementById('prev-btn').style.display = (preguntaActualIndex > 0) ? 'inline-block' : 'none';
        
        // Mostrar "Siguiente" o "Finalizar" SÓLO si la pregunta actual ya ha sido respondida
        if (item.respuestaUsuario) {
            document.getElementById('next-btn').style.display = 'inline-block';
            document.getElementById('next-btn').innerText = (preguntaActualIndex === bancoPreguntas.length - 1) ? 'Finalizar Examen' : 'Siguiente ➡';
        } else {
            document.getElementById('next-btn').style.display = 'none';
        }

        renderizarOpciones(item);
    }

    function renderizarOpciones(item) {
        const optionsContainer = document.getElementById('options');
        const feedbackArea = document.getElementById('feedback-area');
        optionsContainer.innerHTML = ''; 

        let yaRespondida = item.respuestaUsuario !== null;

        item.opcionesMezcladas.forEach(opcion => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opcion;
            
            // Si ya se ha respondido, aplicamos estilos visuales para mostrar la corrección
            if (yaRespondida) {
                if (opcion === item.respuesta) {
                    btn.classList.add('correct');
                } else if (opcion === item.respuestaUsuario && opcion !== item.respuesta) {
                    btn.classList.add('incorrect');
                }
            }

            // Mantenemos los botones funcionales para que se pueda cambiar la respuesta si se desea
            btn.onclick = () => {
                item.respuestaUsuario = opcion;
                // Renderizamos de nuevo para actualizar colores
                renderizarOpciones(item);
                
                // Mostramos el botón siguiente automáticamente al responder
                const nextBtn = document.getElementById('next-btn');
                nextBtn.style.display = 'inline-block';
                nextBtn.innerText = (preguntaActualIndex === bancoPreguntas.length - 1) ? 'Finalizar Examen' : 'Siguiente ➡';
            };

            optionsContainer.appendChild(btn);
        });

        if (yaRespondida) {
            if (item.respuestaUsuario === item.respuesta) {
                feedbackArea.innerText = "✅ ¡CORRECTO!";
                feedbackArea.style.color = "#27ae60";
            } else {
                feedbackArea.innerText = "❌ INCORRECTO. La respuesta era: " + item.respuesta;
                feedbackArea.style.color = "#c0392b";
            }
        } else {
            feedbackArea.innerText = "";
        }
    }

    function preguntaAnterior() {
        if (preguntaActualIndex > 0) {
            preguntaActualIndex--;
            mostrarPregunta();
        }
    }

    function siguientePregunta() {
        if (preguntaActualIndex < bancoPreguntas.length - 1) {
            preguntaActualIndex++;
            mostrarPregunta();
        } else {
            mostrarResultados();
        }
    }

    function mostrarResultados() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        const total = bancoPreguntas.length;
        if (total === 0) {
            document.getElementById('resumen-container').innerHTML = '<p>No se han podido calcular resultados porque no hay preguntas cargadas.</p>';
            return;
        }
        
        // Recalculamos el puntaje al final según todas las respuestas guardadas
        let aciertos = 0;
        bancoPreguntas.forEach(q => {
            if (q.respuestaUsuario === q.respuesta) {
                aciertos++;
            }
        });
        
        const fallos = total - aciertos;
        let notaFinal = aciertos;
        
        let htmlResumen = `
            <p>✅ <b>Aciertos:</b> ${aciertos}</p>
            <p>❌ <b>Fallos:</b> ${fallos}</p>
        `;

        // Aplicar penalización SOLO si el examen es de 30 preguntas
        if (total === 30) {
            const penalizacion = fallos / 3;
            notaFinal = aciertos - penalizacion;
            
            if(notaFinal < 0) notaFinal = 0;

            htmlResumen += `
                <p style="color: #e74c3c;">⚠️ <b>Penalización (1/3 por fallo):</b> -${penalizacion.toFixed(2)} puntos</p>
                <div class="nota-final">Nota Final Real: ${notaFinal.toFixed(2)} / ${total}</div>
            `;
        } else {
            htmlResumen += `
                <div class="nota-final">Nota Final: ${notaFinal} / ${total}</div>
            `;
        }
        
        const notaSobre10 = (notaFinal / total) * 10;
        htmlResumen += `<p><b>Calificación sobre 10:</b> ${notaSobre10.toFixed(2)}</p>`;
        
        document.getElementById('resumen-container').innerHTML = htmlResumen;
    }

    function volverAlInicio() {
        document.getElementById('start-area-tema').style.display = 'block';
        document.getElementById('start-area-cantidad').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'none';
        temaSeleccionado = "Todos";
    }
</script>

</body>
